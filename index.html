<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F5F2EE" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Timetable" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
    <link rel="shortcut icon" href="icons/favicon.ico" type="image/x-icon" />
    <title>Timetable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading">
      <div class="spinner"></div>
      <p id="loading-msg">Loading schedule…</p>
    </div>

    <!-- App shell -->
    <div id="app">
      <main id="views">
        <!-- HOME PAGE -->
        <section class="view active" id="view-today">
          <div class="page-hdr">
            <div class="page-title" id="today-title">Today</div>
            <div class="page-sub" id="today-sub">—</div>
          </div>
          <div class="next-banner inactive" id="next-banner">
            <div class="pulse-dot off" id="pulse-dot"></div>
            <div>
              <div class="next-lbl">Next Class</div>
              <div class="next-name" id="next-name">—</div>
              <div class="next-cd" id="next-cd"></div>
            </div>
          </div>
          <div class="sec-lbl">Today's Classes</div>
          <div class="class-list" id="today-list"></div>
          <div class="sec-lbl" id="tmr-lbl">Tomorrow</div>
          <div class="class-list" id="tomorrow-list"></div>
        </section>

        <!-- MY TIMETABLE PAGE -->
        <section class="view" id="view-mine">
          <div class="page-hdr">
            <div class="page-title">My Timetable</div>
            <div class="page-sub" id="mine-term">—</div>
          </div>
          <div class="week-wrap" id="mine-week"></div>
        </section>

        <!-- CLASS TIMETABLES PAGE -->
        <section class="view" id="view-overview">
          <div class="page-hdr">
            <div class="page-title">All Classes</div>
            <div class="page-sub" id="ov-term">—</div>
          </div>
          <div class="day-selector" id="day-selector"></div>
          <div class="grp-toggle" id="grp-toggle"></div>
          <div class="ov-wrap" id="ov-wrap"></div>
        </section>
      </main>

      <!-- Bottom Nav -->
      <nav id="tabbar">
        <div class="tab active" data-tab="today" onclick="switchTab('today')">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3.5" />
            <line x1="12" y1="2" x2="12" y2="5" />
            <line x1="12" y1="19" x2="12" y2="22" />
            <line x1="2" y1="12" x2="5" y2="12" />
            <line x1="19" y1="12" x2="22" y2="12" />
          </svg>
          <span>Today</span>
        </div>
        <div class="tab" data-tab="mine" onclick="switchTab('mine')">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <span>My Schedule</span>
        </div>
        <div class="tab" data-tab="overview" onclick="switchTab('overview')">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1.5" />
            <rect x="14" y="3" width="7" height="7" rx="1.5" />
            <rect x="3" y="14" width="7" height="7" rx="1.5" />
            <rect x="14" y="14" width="7" height="7" rx="1.5" />
          </svg>
          <span>All Classes</span>
        </div>
      </nav>
    </div>

    <script src="app.js"></script>
  </body>
</html>
